# 推送以 v 开头的标签（如 v0.0.1）时，自动构建 Android APK 并附加到 GitHub Release。
# 用法：git tag v0.0.1 && git push origin v0.0.1
#
# 说明：首次构建常需 15～40 分钟（下载 Android SDK、Gradle、依赖）。若长时间无输出，
# 请在 Actions 日志里展开当前步骤查看是否在下载。

name: Release Android APK

on:
  push:
    tags:
      - "v*"
  # 标签已存在但 Release/APK 被删时，可手动运行并指定标签补发
  workflow_dispatch:
    inputs:
      release_tag:
        description: "已有标签名（如 v0.0.2）"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.release_tag) || github.ref }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ubuntu-latest 不含完整 Android SDK；不显式安装时 flutter build apk 会隐式拉取，极易长时间「转圈」
      - name: Install Android SDK (cmdline-tools)
        run: |
          set -euo pipefail
          ANDROID_SDK_ROOT="$HOME/android-sdk"
          rm -rf "$ANDROID_SDK_ROOT"
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
          curl -fsSL "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" -o /tmp/cmdline-tools.zip
          unzip -q /tmp/cmdline-tools.zip -d /tmp/cmdline-unpack
          if [ -d /tmp/cmdline-unpack/cmdline-tools ]; then
            mv /tmp/cmdline-unpack/cmdline-tools "$ANDROID_SDK_ROOT/cmdline-tools/latest"
          else
            mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools/latest"
            shopt -s dotglob
            mv /tmp/cmdline-unpack/* "$ANDROID_SDK_ROOT/cmdline-tools/latest/"
          fi
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          echo "$ANDROID_SDK_ROOT/platform-tools" >> "$GITHUB_PATH"
          # GITHUB_PATH 不作用于本 step 内当前 shell，需手动 export
          export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH"
          SDKM="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          # 在 pipefail 下 yes 可能 SIGPIPE，临时关闭 pipefail，仅检查 sdkmanager 结果
          set +o pipefail
          yes | "$SDKM" --sdk_root="$ANDROID_SDK_ROOT" --licenses >/dev/null
          set -o pipefail
          "$SDKM" --sdk_root="$ANDROID_SDK_ROOT" "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('mobile-app/**/*.gradle*', 'mobile-app/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter doctor (verbose)
        run: flutter doctor -v

      - name: Flutter pub get
        working-directory: mobile-app
        run: flutter pub get

      - name: Build release APK
        working-directory: mobile-app
        run: flutter build apk --release --verbose

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
          name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
          prerelease: ${{ startsWith(github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name, 'v0.') }}
          draft: false
          fail_on_unmatched_files: true
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
          working_directory: mobile-app
          files: |
            build/app/outputs/flutter-apk/app-release.apk
